version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: gate-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-marktplatz}
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --locale=de_DE.UTF-8
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gate-network

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: gate-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - gate-network

  # API Server
  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    container_name: gate-api
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-marktplatz}
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./artifacts/api-server/src:/app/src
    networks:
      - gate-network

  # Frontend
  web:
    build:
      context: .
      dockerfile: artifacts/selinova-web/Dockerfile
    container_name: gate-web
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:3000/api
    ports:
      - "5173:5173"
    volumes:
      - ./artifacts/selinova-web/src:/app/src
    depends_on:
      - api
    networks:
      - gate-network

volumes:
  postgres_data:
  redis_data:

networks:
  gate-network:
    driver: bridge
